<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff6a3d"/>
      <stop offset="1" stop-color="#ffb020"/>
    </linearGradient>
  </defs>
  <!-- charging case -->
  <rect x="120" y="150" width="160" height="110" rx="26" fill="#1b222c" stroke="#3a4656" stroke-width="3"/>
  <rect x="120" y="150" width="160" height="14" rx="7" fill="#26303c"/>
  <circle cx="200" cy="205" r="10" fill="url(#g1)"/>
  <!-- left earbud -->
  <g transform="translate(150,110)">
    <ellipse cx="0" cy="0" rx="26" ry="30" fill="#eef2f6"/>
    <ellipse cx="0" cy="0" rx="26" ry="30" fill="none" stroke="#c7cdd6" stroke-width="2"/>
    <path d="M14 20 q22 10 18 40" fill="none" stroke="url(#g1)" stroke-width="8" stroke-linecap="round"/>
    <circle cx="-4" cy="-6" r="7" fill="url(#g1)"/>
  </g>
  <!-- right earbud -->
  <g transform="translate(250,110)">
    <ellipse cx="0" cy="0" rx="26" ry="30" fill="#eef2f6"/>
    <ellipse cx="0" cy="0" rx="26" ry="30" fill="none" stroke="#c7cdd6" stroke-width="2"/>
    <path d="M-14 20 q-22 10 -18 40" fill="none" stroke="url(#g1)" stroke-width="8" stroke-linecap="round"/>
    <circle cx="4" cy="-6" r="7" fill="url(#g1)"/>
