# Render Blueprint — Amana Pay + Nova Gadgets store
# ينشئ خدمتَين مجانيتَين على Render دفعة واحدة:
#   1) amana-pay-backend  : البوابة (API + payment page + dashboard + WebSocket)
#   2) nova-gadgets-store : المتجر التجريبي الذي يستهلك البوابة
#
# الاستخدام: ادفع المشروع إلى GitHub، ثم على Render:
#   New +  →  Blueprint  →  اختر المستودع  →  Apply.
services:
  # ---------------------------------------------------------------------------
  # 1) بوابة الدفع Amana Pay
  # ---------------------------------------------------------------------------
  - type: web
    name: amana-pay-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 24.11.1
      - key: NODE_ENV
        value: production
      - key: JOPACC_MODE
        value: mock
      # زرع تاجر ثابت بمفتاح ثابت عند كل إقلاع (يحافظ على ثبات المفتاح رغم تصفّر DB)
      - key: SEED_MERCHANT
        value: "true"
      - key: SEED_MERCHANT_EMAIL
        value: store@novagadgets.jo
      - key: SEED_MERCHANT_ACCOUNT
        value: acc_demo_002
      - key: SEED_MERCHANT_NAME
        value: Nova Gadgets
      - key: SEED_MERCHANT_PLAN
        value: GROWTH
      # المفتاح الثابت — غيّره من لوحة Render إن أردت. ثابت عبر إعادة التشغيل.
      - key: SEED_MERCHANT_API_KEY
        value: ak_demo_novagadgets_2026
      # PORT يوفّره Render تلقائياً؛ الخادم يقرأه من process.env.PORT

  # ---------------------------------------------------------------------------
  # 2) المتجر التجريبي Nova Gadgets
  # ---------------------------------------------------------------------------
  - type: web
    name: nova-gadgets-store
    runtime: node
    plan: free
    rootDir: nova-gadgets-store
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 24.11.1
      - key: NODE_ENV
        value: production
      # يُحقن تلقائياً عنوان البوابة (hostname) — config.js يضيف https:// عند اللزوم
      - key: AMANA_PAY_URL
        fromService:
          type: web
          name: amana-pay-backend
          property: host
      - key: STORE_ACCOUNT_ID
        value: acc_demo_002
      - key: STORE_EMAIL
        value: store@novagadgets.jo
      # نفس المفتاح الثابت للبوابة (يُنسخ تلقائياً) — يبقى المتجر والداش بورد متزامنين
      - key: STORE_API_KEY
        fromService:
          type: web
          name: amana-pay-backend
          envVarKey: SEED_MERCHANT_API_KEY
